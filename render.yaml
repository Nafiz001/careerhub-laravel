# Render Blueprint for CareerHub (free tier, Docker runtime).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: careerhub
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # Don't let Cloudflare cache JS/CSS bundles. Render's free tier sleeps
    # after 15 min of inactivity; on the next request the origin can take
    # 30+ s to wake up. A cached stale 520 error then gets replayed to
    # every visitor until the cache TTL expires. Bypassing the cache for
    # /build/assets/ means each request always asks the live origin.
    headers:
      - path: /build/assets/*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /build/assets/*
        name: Pragma
        value: no-cache
    envVars:
      - key: APP_NAME
        value: CareerHub
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Generate once with `php artisan key:generate --show` and paste here,
      # or leave unset and the entrypoint will generate one on boot.
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: LOG_CHANNEL
        value: stderr
